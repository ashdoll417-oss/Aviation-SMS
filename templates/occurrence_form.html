<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AISL-SD-005 Occurrence Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">AISL-SD-005 Occurrence Report Form</h1>
        <form method="POST" action="{{ url_for('report_occurrence') }}">
            <div class="mb-3">
                <label for="description" class="form-label">Description of Hazard</label>
                <textarea class="form-control" id="description" name="description" rows="8" placeholder="Provide detailed description of the hazard/occurrence..." required></textarea>
            </div>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="personnel_injured" class="form-label">Personnel Injured</label>
                    <input type="text" class="form-control" id="personnel_injured" name="personnel_injured" placeholder="Names/Number of personnel injured">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="equipment_damaged" class="form-label">Equipment Damaged</label>
                    <input type="text" class="form-control" id="equipment_damaged" name="equipment_damaged" placeholder="Equipment/components damaged">
                </div>
            </div>
            
            <div class="mb-3">
                <label for="immediate_action" class="form-label">Immediate Corrective Action</label>
                <textarea class="form-control" id="immediate_action" name="immediate_action" rows="4" placeholder="Actions taken immediately to mitigate/control the hazard..." required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary">Submit Occurrence Report</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</body>
</html>
