<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Response Received</title>

  <!-- Bootstrap 5 (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background:
        radial-gradient(1100px 550px at 15% 10%, rgba(13,91,214,.25), transparent 55%),
        radial-gradient(900px 500px at 85% 20%, rgba(11,42,102,.22), transparent 50%),
        linear-gradient(180deg, #06122a 0%, #070a13 100%);
      color: #eaf2ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 28px 0;
    }
    .card-wrap{
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }
    .brand-card{
      background: linear-gradient(180deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,.04) 100%);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 18px;
      box-shadow: 0 18px 45px rgba(0,0,0,.35);
      overflow: hidden;
    }
    .brand-header{
      background: linear-gradient(90deg, rgba(13,91,214,.35) 0%, rgba(11,42,102,.15) 70%, rgba(255,255,255,.06) 100%);
      border-bottom: 1px solid rgba(255,255,255,.10);
    }
    .success-icon{
      width: 58px;
      height: 58px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(13,91,214,.18);
      border: 1px solid rgba(13,91,214,.38);
      box-shadow: 0 10px 30px rgba(13,91,214,.15);
    }
    .help-text{
      color: rgba(234,242,255,.78);
    }
  </style>
</head>
<body>
  <div class="container card-wrap">
    <div class="brand-card">
      <div class="brand-header py-3 px-4">
        <h3 class="m-0">Audit Response Submitted</h3>
      </div>
      <div class="p-4 p-md-5">
        <div class="d-flex align-items-start gap-3">
          <div class="success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#d7e7ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 6 9 17l-5-5" />
            </svg>
          </div>
          <div>
            <h2 class="fw-bold mb-2">Thank you!</h2>
            <p class="mb-0 help-text" style="font-size: 1.05rem;">
              Your response has been securely transmitted back to the Head of Safety Office.
              You can now close this window.
            </p>
          </div>
        </div>

        <hr style="border-color: rgba(255,255,255,.12);" class="my-4">

        <div class="text-center">
          <button class="btn btn-primary btn-lg px-4" type="button" onclick="window.close()">
            Close Window
          </button>
          <div class="help-text small mt-2">
            If the window cannot be closed automatically, you may safely refresh/exit this page.
          </div>
        </div>
      </div>
    </div>

    <div class="text-center mt-3 small help-text">
      External response link is unauthenticated by design.
    </div>
  </div>
</body>
</html>
