<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aviation SMS ERP{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Aviation Theme -->
    <style>
        :root {
            --aviation-navy: #0a2540;
            --aviation-blue: #1e6091;
            --aviation-light: #e3f2fd;
        }
        body { background-color: var(--aviation-light); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: linear-gradient(135deg, var(--aviation-navy), var(--aviation-blue)); }
        .navbar-brand, .nav-link { color: white !important; }
        .nav-link:hover { color: var(--aviation-light) !important; }
        .content { min-height: 70vh; padding: 2rem; }
        footer { background: var(--aviation-navy); color: white; padding: 1rem 0; }
        .kpi-card { background: white; border-left: 5px solid var(--aviation-blue); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        .btn-terminate {
            background: rgba(255, 69, 58, 0.1);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 69, 58, 0.4);
            color: #ff453a;
            padding: 10px 22px;
            border-radius: 12px;
            font-weight: 800;
            transition: 0.4s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-terminate:hover {
            background: #ff453a;
            color: white;
            box-shadow: 0 10px 25px rgba(255, 69, 58, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('index') }}">✈ Aviation SMS ERP</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}">Dashboard</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Safety Policy</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="{{ url_for('manage_objectives') }}">Objectives</a></li>
                            <li><a class="dropdown-item" href="{{ url_for('list_erp') }}">Emergency Response Plan</a></li>
                            <li><a class="dropdown-item" href="#">Policies</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('risk_assessment') }}">Risk Management</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('report_occurrence') }}" title="Add New Report">
                            <i class="fas fa-plus-circle"></i> Add New
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('safety_assurance') }}">Safety Assurance</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Safety Promotion</a></li>
                    <li class="nav-item">
                        <a href="{{ url_for('logout') }}" class="btn-terminate">
                            <span>⏻</span> TERMINATE SESSION
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center">
        <div class="container">
            <p>&copy; 2024 Aviation SMS ERP System | Powered by Flask</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
