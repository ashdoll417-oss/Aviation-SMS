{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 980px;">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">Safety Assurance</h2>
    <span class="badge text-bg-primary">Audit Plan Upload</span>
  </div>

  <div class="card shadow-sm">
    <div class="card-header bg-white">
      <strong>Safety Assurance - Audit Plan Upload</strong>
    </div>

    <div class="card-body">
      <form method="POST" enctype="multipart/form-data">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label" for="audit_date">Audit Date <span class="text-danger">*</span></label>
            <input id="audit_date" type="datetime-local" name="audit_date" class="form-control" required title="Select the audit date/time" />
          </div>

          <div class="col-md-4">
            <label class="form-label" for="status">Status</label>
            <select id="status" name="status" class="form-select" title="Select status">
              <option value="Open">Open</option>
              <option value="Closed">Closed</option>
            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label" for="next_audit_date">Next Audit Date</label>
            <input id="next_audit_date" type="datetime-local" name="next_audit_date" class="form-control" title="Select the next audit date/time" />
          </div>

          <div class="col-md-6">
            <label class="form-label" for="audit_scope">Audit Scope</label>
            <input id="audit_scope" type="text" name="audit_scope" class="form-control" placeholder="e.g., SMS Processes - 2026" title="Enter audit scope" />
          </div>

          <div class="col-md-6">
            <label class="form-label" for="target_month">Target Month</label>
            <input id="target_month" type="text" name="target_month" class="form-control" placeholder="e.g., 2026-07 or July 2026" title="Enter target month" />
          </div>

          <div class="col-md-12">
            <label class="form-label" for="finding_details">Finding Details</label>
            <textarea id="finding_details" name="finding_details" class="form-control" rows="3" placeholder="Optional summary of findings..." title="Enter optional finding details"></textarea>
          </div>

          <div class="col-md-12">
            <div class="p-3 rounded border bg-light">
              <div class="d-flex align-items-center gap-3">
                <div class="fs-3" aria-hidden="true">📎</div>
                <div class="flex-grow-1">
                  <label class="form-label mb-1" for="audit_plan">Upload Audit Plan</label>
                  <div class="form-text mb-2">
                    Allowed files: PDF, DOCX, XLSX
                  </div>
                  <input id="audit_plan" class="form-control" type="file" name="audit_plan" accept=".pdf,.docx,.xlsx" aria-label="Upload the audit plan document" />
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" value="true" id="department_notified" name="department_notified" />
              <label class="form-check-label" for="department_notified">
                Notify department (Department Notified)
              </label>
            </div>
          </div>

          <div class="col-md-12 d-flex gap-2 justify-content-end">
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Back</a>
            <button type="submit" class="btn btn-primary">
              Save Audit Record
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>

</div>
{% endblock %}
