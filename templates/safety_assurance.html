{% extends "base.html" %}

{% block content %}
<div class="container mt-4" style="max-width: 980px;">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="mb-0">Safety Assurance</h2>
    <span class="badge text-bg-primary">Audit Plan Upload</span>
  </div>

  <!-- TAB SWITCHER HTML (Place right below the page heading): -->
  <div class="flex justify-center space-x-4 mb-6">
    <button id="btn-upload" class="px-5 py-2.5 rounded-lg font-medium text-sm transition-all duration-200 bg-blue-600 text-white shadow" onclick="switchTab('upload')">
        Upload &amp; Schedule Audit
    </button>
    <button id="btn-history" class="px-5 py-2.5 rounded-lg font-medium text-sm transition-all duration-200 bg-gray-100 text-gray-600 hover:bg-gray-200" onclick="switchTab('history')">
        View Audit History &amp; Records
    </button>
  </div>

  <!-- WRAPPER SECTIONS -->
  <div id="upload-section" class="block">
    <div class="card shadow-sm">
      <div class="card-header bg-white">
        <strong>Safety Assurance - Audit Plan Upload</strong>
      </div>

      <div class="card-body">
        <form method="POST" enctype="multipart/form-data" onsubmit="return window.__safetyAssuranceOnSubmit(event)">
          <input type="hidden" name="audit_date" id="audit_date_hidden" />
          <input type="hidden" name="next_audit_date" id="next_audit_date_hidden" />

          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label" for="audit_date">Audit Date <span class="text-danger">*</span></label>
              <input id="audit_date" type="datetime-local" name="audit_date_ui" class="form-control" required title="Select the audit date/time" />
            </div>

            <div class="col-md-4">
              <label class="form-label" for="status">Status</label>
              <select id="status" name="status" class="form-select" title="Select status">
                <option value="Open">Open</option>
                <option value="Closed">Closed</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label" for="next_audit_date">Next Audit Date</label>
              <input id="next_audit_date" type="datetime-local" name="next_audit_date_ui" class="form-control" title="Select the next audit date/time" />
            </div>

            <script>
              window.__safetyAssuranceOnSubmit = function (event) {
                try {
                  const auditInput = document.getElementById('audit_date');
                  const nextInput = document.getElementById('next_audit_date');

                  function pad2(n) { return String(n).padStart(2, '0'); }

                  function toFlatpickrLike(iso) {
                    // iso expected: "YYYY-MM-DDTHH:MM"
                    if (!iso) return '';
                    const dt = new Date(iso);
                    if (Number.isNaN(dt.getTime())) return '';

                    const mm = pad2(dt.getMonth() + 1);
                    const dd = pad2(dt.getDate());
                    const yyyy = dt.getFullYear();

                    let hours = dt.getHours();
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    hours = hours % 12;
                    if (hours === 0) hours = 12;

                    const minutes = pad2(dt.getMinutes());
                    return `${mm}/${dd}/${yyyy}, ${pad2(hours)}:${minutes} ${ampm}`.replace(/\/(\d{2}), (\d{2}):/,'/$1, $2:'); 
                    // Note: the replace above is no-op for typical values; it just avoids accidental formatting issues.
                  }

                  const auditVal = auditInput ? auditInput.value : '';
                  if (!auditVal) return true; // required attribute will handle validation

                  const flatAudit = toFlatpickrLike(auditVal);
                  if (!flatAudit) return false;

                  document.getElementById('audit_date_hidden').value = flatAudit;

                  const nextVal = nextInput ? nextInput.value : '';
                  const flatNext = toFlatpickrLike(nextVal);
                  if (flatNext) document.getElementById('next_audit_date_hidden').value = flatNext;
                  else document.getElementById('next_audit_date_hidden').value = '';

                  return true;
                } catch (e) {
                  console.error(e);
                  return true;
                }
              };
            </script>

            <div class="col-md-6">
              <label class="form-label" for="audit_scope">Audit Scope</label>
              <input id="audit_scope" type="text" name="audit_scope" class="form-control" placeholder="e.g., SMS Processes - 2026" title="Enter audit scope" />
            </div>

            <div class="col-md-6">
              <label class="form-label" for="target_month">Target Month</label>
              <input id="target_month" type="text" name="target_month" class="form-control" placeholder="e.g., 2026-07 or July 2026" title="Enter target month" />
            </div>

            <div class="col-md-12">
              {# Keep the remainder of your existing upload form markup here #}
